<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VTC Comparador</title>
    <link rel="stylesheet" href="vtc-comparador.css">
</head>
<body>

<div id="vtc-comparador-container">
    <div class="vtc-dashboard">
        <div class="vtc-card"><h3>Trips Geotab</h3><p id="dash-trips">0</p></div>
        <div class="vtc-card"><h3>Registrados APP</h3><p id="dash-app">0</p></div>
        <div class="vtc-card"><h3>No Registrados</h3><p id="dash-noapp">0</p></div>
        <div class="vtc-card"><h3>🚨 Sospechosos</h3><p id="dash-sus">0</p></div>
    </div>

    <div class="vtc-controls">
        <div>
            <label>Filtro: </label>
            <select id="vtc-filter">
                <option value="ALL">Todos</option>
                <option value="NO_APP">No registrados</option>
                <option value="SUSPECTS">Solo sospechosos</option>
                <option value="HIGH">Solo riesgo alto</option>
                <option value="CRITICAL">Solo riesgo crítico</option>
            </select>
        </div>
        <button class="vtc-btn-excel" id="vtc-export">📥 Exportar a Excel</button>
    </div>

    <div class="vtc-table-wrapper">
        <table class="vtc-table">
            <thead>
                <tr>
                    <th>Riesgo</th>
                    <th>Vehículo</th>
                    <th>Inicio</th>
                    <th>Km Geotab</th>
                    <th>Paradas Rápidas</th>
                    <th>Tiempo Detenido</th>
                    <th>APP</th>
                </tr>
            </thead>
            <tbody id="vtc-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
geotab.addin.vtcComparador = function (api, state) {
    let ruleIdParadaRapida = null;
    let dataStore = []; 

    // --- Lógica de Negocio ---
    
    const calcularRiesgo = (tieneApp, numParadas, tiempoDetenido, diffKm) => {
        let score = 0;
        if (!tieneApp) score += 40;
        score += (numParadas * 15);
        if (tiempoDetenido > 120) score += 20;
        if (diffKm > 5) score += 25;

        if (score < 30) return { nivel: 'BAJO', clase: 'bajo' };
        if (score < 60) return { nivel: 'MEDIO', clase: 'medio' };
        if (score < 85) return { nivel: 'ALTO', clase: 'alto' };
        return { nivel: 'CRÍTICO', clase: 'critico' };
    };

    const getRuleId = async () => {
        return new Promise((resolve, reject) => {
            api.call("Get", {
                typeName: "Rule",
                search: { name: "Parada rápida" }
            }, (result) => {
                if (result && result.length > 0) resolve(result[0].id);
                else resolve(null);
            }, reject);
        });
    };

    const fetchOptimizedData = async () => {
        // 1. Obtener la regla dinámicamente y cachearla
        if (!ruleIdParadaRapida) {
            ruleIdParadaRapida = await getRuleId();
        }
        
        if (!ruleIdParadaRapida) {
            console.error("Regla 'Parada rápida' no encontrada.");
            return;
        }

        // 2. Fetch Trips (Simulado para ejemplo, debes usar state.device o timeframe)
        // Ejemplo simplificado: En producción usarías fechas y vehículos reales de 'state'
        const trips = await new Promise(res => api.call("Get", { typeName: "Trip", resultsLimit: 50 }, res));
        
        let exceptionsData = [];
        // Optimizamos: pedimos ExceptionEvents solo para la regla que nos interesa en el rango de fechas
        if (trips.length > 0) {
            exceptionsData = await new Promise(res => api.call("Get", {
                typeName: "ExceptionEvent",
                search: { ruleSearch: { id: ruleIdParadaRapida } },
                resultsLimit: 200
            }, res));
        }

        dataStore = procesarViajes(trips, exceptionsData);
        renderizarTabla(dataStore);
        actualizarDashboard(dataStore);
    };

    const procesarViajes = (trips, exceptions) => {
        return trips.map(trip => {
            // Relacionar excepciones con este viaje
            const tripExceptions = exceptions.filter(e => 
                new Date(e.activeFrom) >= new Date(trip.start) && 
                new Date(e.activeTo) <= new Date(trip.stop)
            );

            // Cálculo duración real (Duración de excepción + 45 segundos)
            let tiempoDetenido = 0;
            tripExceptions.forEach(e => {
                const diffSecs = (new Date(e.activeTo) - new Date(e.activeFrom)) / 1000;
                tiempoDetenido += (diffSecs + 45); 
            });

            // Simulación de datos de la APP para la lógica (Esto vendría de tu API externa)
            const tieneApp = Math.random() > 0.5; 
            const kmGeotab = trip.distance;
            const diffKm = tieneApp ? Math.random() * 10 : kmGeotab; 

            const riesgo = calcularRiesgo(tieneApp, tripExceptions.length, tiempoDetenido, diffKm);

            return {
                id: trip.id,
                vehiculo: trip.device.id,
                inicio: new Date(trip.start).toLocaleString(),
                kmGeotab: kmGeotab.toFixed(2),
                paradas: tripExceptions.length,
                tiempo: tiempoDetenido.toFixed(0),
                tieneApp: tieneApp,
                riesgo: riesgo
            };
        });
    };

    // --- Lógica Visual y Eventos ---

    const actualizarDashboard = (data) => {
        document.getElementById('dash-trips').innerText = data.length;
        document.getElementById('dash-app').innerText = data.filter(d => d.tieneApp).length;
        document.getElementById('dash-noapp').innerText = data.filter(d => !d.tieneApp).length;
        document.getElementById('dash-sus').innerText = data.filter(d => d.riesgo.nivel === 'ALTO' || d.riesgo.nivel === 'CRÍTICO').length;
    };

    const renderizarTabla = (data) => {
        const tbody = document.getElementById('vtc-table-body');
        tbody.innerHTML = '';
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge ${row.riesgo.clase}">${row.riesgo.nivel}</span></td>
                <td>${row.vehiculo}</td>
                <td>${row.inicio}</td>
                <td>${row.kmGeotab}</td>
                <td>${row.paradas}</td>
                <td>${row.tiempo} s</td>
                <td>${row.tieneApp ? 'Sí' : 'No'}</td>
            `;
            tbody.appendChild(tr);
        });
    };

    const aplicarFiltro = () => {
        const filterVal = document.getElementById('vtc-filter').value;
        let filtered = dataStore;
        
        if (filterVal === 'NO_APP') filtered = dataStore.filter(d => !d.tieneApp);
        else if (filterVal === 'SUSPECTS') filtered = dataStore.filter(d => ['ALTO', 'CRÍTICO'].includes(d.riesgo.nivel));
        else if (filterVal === 'HIGH') filtered = dataStore.filter(d => d.riesgo.nivel === 'ALTO');
        else if (filterVal === 'CRITICAL') filtered = dataStore.filter(d => d.riesgo.nivel === 'CRÍTICO');

        renderizarTabla(filtered);
    };

    const exportarExcel = () => {
        const headers = ["Riesgo", "Vehiculo", "Inicio", "Km Geotab", "Paradas", "Tiempo Detenido (s)", "Registrado APP"];
        const rows = dataStore.map(d => [
            d.riesgo.nivel, d.vehiculo, d.inicio, d.kmGeotab, d.paradas, d.tiempo, d.tieneApp ? 'SI' : 'NO'
        ]);
        
        // Exportación CSV con BOM para que Excel lea los caracteres en UTF-8 correctamente
        let csvContent = "\uFEFF" + headers.join(";") + "\r\n";
        rows.forEach(row => {
            csvContent += row.join(";") + "\r\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "vtc_report.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    return {
        initialize: function (api, state, callback) {
            document.getElementById('vtc-filter').addEventListener('change', aplicarFiltro);
            document.getElementById('vtc-export').addEventListener('click', exportarExcel);
            callback();
        },
        focus: function (api, state) {
            fetchOptimizedData();
        },
        blur: function (api, state) {
            // Limpieza si es necesaria al salir de la pestaña
        }
    };
};
</script>
</body>
</html>
