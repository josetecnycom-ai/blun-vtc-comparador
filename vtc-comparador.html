<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Comparador de Viajes VTC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="css/vtc-comparador.css">
</head>
<body style="margin: 0; padding: 0; width: 100%; height: 100%; background-color: transparent !important; color: var(--ink);">

<div id="vtc-app-wrapper">
<div class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><path d="M9 17H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/><path d="m19 14-2 3h4l-2 3"/><line x1="9" y1="11" x2="9" y2="17"/><line x1="12" y1="8" x2="12" y2="17"/><line x1="15" y1="5" x2="15" y2="11"/></svg>
    </div>
    <h1>Comparador de Viajes VTC</h1>
    <span class="header-sub">APP vs Geotab</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span class="badge-db">blun</span>
    <button class="btn" id="btnExport" style="display:none;" onclick="exportExcel()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Exportar Excel
    </button>
  </div>
</div>

<div class="main">

  <div class="upload-zone" id="dropZone"
    ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)"
    ondrop="onDrop(event)" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p id="uploadLabel">Arrastra el CSV de la APP aquí o <strong>haz clic para seleccionar</strong></p>
    <input type="file" id="fileInput" accept=".csv" onchange="handleFile(this.files[0])"/>
  </div>

  <div class="settings-bar">
    <div class="setting-group">
      <label>Tolerancia horaria (min)</label>
      <input type="number" id="tolerance" value="5" min="1" max="30" style="width:90px;"/>
    </div>
    <div class="setting-group">
      <label>Distancia mínima Geotab (km)</label>
      <input type="number" id="minDist" value="0.5" min="0" step="0.1" style="width:110px;"/>
    </div>
    <div class="setting-group">
      <label>Filtrar vehículo</label>
      <select id="filterVehicle">
        <option value="all">Todos</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Mostrar en detalle</label>
      <select id="filterShow">
        <option value="unmatched">Solo no registrados en APP</option>
        <option value="all">Todos los trips de Geotab</option>
      </select>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:flex-end;">
      <button class="btn btn-primary" id="btnRun" onclick="runComparison()" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Comparar
      </button>
    </div>
  </div>

  <div id="resultsArea">
    <div class="state">
      <svg viewBox="0 0 24 24"><path d="M9 17H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/><path d="m19 14-2 3h4l-2 3"/></svg>
      <p>Carga el CSV de la APP y pulsa <strong>Comparar</strong> para detectar viajes no registrados.</p>
    </div>
  </div>

</div>
</div>

<script>
// ── ESTADO GLOBAL ────────────────────────────────────────
let api = null;
let csvTrips = [];          
let geotabTrips = [];       
let results = [];           
let csvPlates = new Set();  
let sortCol = 'unmatched';
let sortDir = -1;

// ── INIT GEOTAB ──────────────────────────────────────────
if (typeof geotab === 'undefined') {
  window.geotab = { addin: {} };
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('resultsArea').innerHTML =
      '<div class="state"><div class="spinner"></div><p>Modo standalone — conecta a Geotab para datos reales.</p></div>';
  });
}

geotab.addin.comparadorDeViajesVTC = function () {
  return {
    initialize: function (geotabApi, state, callback) {
      api = geotabApi; 
      callback();      
    },
    focus: function (geotabApi, state) {},
    blur: function (geotabApi, state) {}
  };
};

// ── NORMALIZAR MATRÍCULA ─────────────────────────────────
function normPlate(p) {
  return String(p||'').replace(/[^A-Z0-9]/gi,'').toUpperCase().trim();
}

// ── DRAG & DROP ──────────────────────────────────────────
function onDrag(e, over) {
  e.preventDefault();
  document.getElementById('dropZone').classList.toggle('drag', over);
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
}

// ── PARSEAR CSV (CON DETECCIÓN AUTO DE DELIMITADOR) ──────
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    parseCSV(text, file.name);
  };
  reader.readAsText(file, 'utf-8');
}

function parseCSV(text, fname) {
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length === 0) return;

  // AUTO-DETECCIÓN DE DELIMITADOR (; o ,)
  const firstLine = lines[0];
  const sep = firstLine.includes(';') ? ';' : ',';
  const header = firstLine.split(sep);

  const idx = {};
  header.forEach((h, i) => { idx[h.trim()] = i; });

  const trips = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(sep);
    if (cols.length < 2) continue;

    const estado = (cols[idx['Estado del viaje']]||'').trim();
    if (estado !== 'completed') continue;

    const plate = normPlate(cols[idx['Matrícula']]);
    const reqStr = (cols[idx['Hora de la solicitud del viaje']]||'').trim();
    const arrStr = (cols[idx['Hora de llegada del viaje']]||'').trim();
    if (!plate || !reqStr || !arrStr) continue;

    const reqTime = parseDate(reqStr);
    const arrTime = parseDate(arrStr);
    if (!reqTime || !arrTime) continue;

    trips.push({
      uuid: cols[idx['UUID del viaje']],
      conductor: (cols[idx['Nombre del conductor']]||'') + ' ' + (cols[idx['Apellido del conductor']]||''),
      plate,
      plateRaw: cols[idx['Matrícula']],
      reqTime,
      arrTime,
      origin:  cols[idx['Dirección de recogida']]||'',
      dest:    cols[idx['Dirección de destino']]||'',
      dist:    parseFloat((cols[idx['Distancia del viaje']]||'0').replace(',','.')),
      product: cols[idx['Tipo de producto']]||'',
      payment: cols[idx['Tipo de pago']]||'',
    });
  }

  csvTrips = trips;
  csvPlates = new Set(trips.map(t => t.plate));

  document.getElementById('uploadLabel').innerHTML =
    `<strong style="color:var(--ok);">✓ ${fname}</strong> — ${trips.length.toLocaleString('es')} viajes cargados (Formato: Sep. "${sep}")`;

  const sel = document.getElementById('filterVehicle');
  sel.innerHTML = '<option value="all">Todos</option>';
  [...csvPlates].sort().forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });

  document.getElementById('btnRun').disabled = false;
}

// ── PARSEADOR DE FECHA MULTI-FORMATO ─────────────────────
function parseDate(s) {
  if (!s) return null;
  s = s.trim();
  // Formato: DD/MM/YYYY HH:MM o DD-MM-YYYY HH:MM
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) {
    return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5], +(m[6]||0));
  }
  // Formato ISO alternativo: YYYY-MM-DD HH:MM
  m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) {
    return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +(m[6]||0));
  }
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function callApi(method, params) {
  return new Promise((res, rej) => api.call(method, params, res, rej));
}

// ── COMPARACIÓN PRINCIPAL OPTIMIZADA ────────────────────
async function runComparison() {
  if (!api) { alert('Conecta a Geotab para ejecutar la comparación.'); return; }
  if (csvTrips.length === 0) { alert('Primero carga el CSV.'); return; }

  const tolerance = parseInt(document.getElementById('tolerance').value) || 5;
  const minDist   = parseFloat(document.getElementById('minDist').value) || 0.5;

  showLoading('Obteniendo base de vehículos de Geotab…');

  try {
    const devices = await callApi('Get', { typeName: 'Device', resultsLimit: 2000 });
    const users = await callApi('Get', { typeName: 'User', resultsLimit: 5000 });
    
    const userMap = {};
    users.forEach(u => {
      userMap[u.id] = (u.firstName && u.lastName) ? (u.firstName + ' ' + u.lastName) : (u.name || 'Desconocido');
    });

    const plateToDevice = {}; 
    devices.forEach(d => {
      // Mapeo robusto: comprobamos tanto name como licensePlate
      const npName = normPlate(d.name);
      if (npName) plateToDevice[npName] = d;
      
      const npPlate = normPlate(d.licensePlate);
      if (npPlate && npPlate !== "VACIO") plateToDevice[npPlate] = d;
    });

    const targetDevices = [...csvPlates]
      .map(p => plateToDevice[p])
      .filter(Boolean);

    if (targetDevices.length === 0) {
      showError('No se encontraron vehículos en Geotab que coincidan con las matrículas del CSV. Revisa el log de vehículos.');
      return;
    }

    const allDates = csvTrips.map(t => t.reqTime).filter(Boolean);
    const minDate = new Date(Math.min(...allDates));
    const maxDate = new Date(Math.max(...allDates));
    minDate.setHours(0,0,0,0);
    maxDate.setHours(23,59,59,999);

    const fromDate = minDate.toISOString();
    const toDate   = maxDate.toISOString();

    let allTrips = [];
    for (let i = 0; i < targetDevices.length; i++) {
      const dev = targetDevices[i];
      updateLoading(`Descargando datos telemáticos… vehículo ${i+1}/${targetDevices.length}: ${dev.name}`);
      try {
        const trips = await callApi('Get', {
          typeName: 'Trip',
          search: {
            fromDate, toDate,
            deviceSearch: { id: dev.id }
          },
          resultsLimit: 40000
        });
        trips.forEach(t => { t._device = dev; });
        allTrips = allTrips.concat(trips);
      } catch(e) {
        console.warn('Error en vehículo', dev.id, e);
      }
    }

    // CÓDIGO CORREGIDO
const geotabFiltered = allTrips.filter(t => (t.distance || 0) >= minDist);
    const tolMs = tolerance * 60 * 1000;

    // LÓGICA DE SOLAPAMIENTO DE INTERVALOS (Intersección Real)
    const enriched = geotabFiltered.map(t => {
      const dev = t._device;
      const plate = normPlate(dev.name) || normPlate(dev.licensePlate);
      const gStart = new Date(t.start || t.startTime);
      const gStop  = new Date(t.stop  || t.stopTime);
      // CÓDIGO CORREGIDO
const gDist = t.distance || 0;

      let geotabDriverName = "Sin Conductor";
      if (t.driver && t.driver.id && t.driver.id !== "UnknownDriverId") {
        geotabDriverName = userMap[t.driver.id] || t.driver.id;
      }

      // Dos intervalos se cruzan si: InicioA <= FinB + Tol && FinA >= InicioB - Tol
      const match = csvTrips.find(c => {
        if (c.plate !== plate) return false;
        const OverlapStart = gStart.getTime() <= (c.arrTime.getTime() + tolMs);
        const OverlapEnd = gStop.getTime() >= (c.reqTime.getTime() - tolMs);
        return OverlapStart && OverlapEnd;
      });

      return {
        gId: t.id,
        gStart, gStop,
        gDist: +gDist.toFixed(2),
        gDur: Math.round((gStop - gStart) / 60000), 
        plate,
        plateOrig: dev.licensePlate || dev.name,
        deviceId: dev.id,
        deviceName: dev.name,
        geotabDriverName,
        matched: !!match,
        csvUUID: match?.uuid || null,
        csvConductor: match?.conductor || null,
        csvDist: match?.dist || null,
        csvProduct: match?.product || null,
      };
    });

    results = enriched;
    renderResults(tolerance, minDist, fromDate, toDate);

  } catch(err) {
    console.error(err);
    showError('Error al procesar en Geotab: ' + (err?.message || String(err)));
  }
}

// ── RENDERIZADO PRINCIPAL ────────────────────────────────
function renderResults(tolerance, minDist, fromDate, toDate) {
  const show      = document.getElementById('filterShow').value;
  const filterPl  = document.getElementById('filterVehicle').value;

  let data = results;
  if (filterPl !== 'all') data = data.filter(r => r.plate === normPlate(filterPl));

  const totalGeotab   = data.length;
  const totalMatched  = data.filter(r => r.matched).length;
  const totalUnmatched= totalGeotab - totalMatched;
  const coverage      = totalGeotab > 0 ? (totalMatched / totalGeotab * 100) : 0;

  const byPlate = {};
  data.forEach(r => {
    if (!byPlate[r.plate]) {
      byPlate[r.plate] = {
        plate: r.plate, plateOrig: r.plateOrig,
        deviceName: r.deviceName, deviceId: r.deviceId,
        total: 0, matched: 0, unmatched: 0, trips: []
      };
    }
    byPlate[r.plate].total++;
    if (r.matched) byPlate[r.plate].matched++;
    else byPlate[r.plate].unmatched++;
    byPlate[r.plate].trips.push(r);
  });

  let vehicles = Object.values(byPlate);
  
  // Guardamos e inyectamos la propiedad para ordenar por cobertura sin romper nada
  vehicles.forEach(v => {
    v._cov = v.total > 0 ? (v.matched / v.total * 100) : 0;
  });
  
  vehicles.sort((a,b) => (a[sortCol] > b[sortCol] ? 1 : -1) * sortDir);

  const html = [];
  const coveragePct = coverage.toFixed(1);
  const coverageClass = coverage >= 85 ? 'm-ok' : coverage >= 60 ? 'm-warn' : 'm-danger';

  html.push(`
  <div class="info-bar">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Rango: ${fmtDateShort(new Date(fromDate))} – ${fmtDateShort(new Date(toDate))} ·
    Ventana ±${tolerance} min · Filtro ≥ ${minDist} km ·
    ${csvPlates.size} Vehículos en CSV · ${vehicles.length} Activos en Geotab
  </div>
  <div class="metrics">
    <div class="metric m-accent">
      <div class="metric-label">Trips en Geotab</div>
      <div class="metric-value">${totalGeotab.toLocaleString('es')}</div>
      <div class="metric-sub">movimientos reales</div>
    </div>
    <div class="metric m-ok">
      <div class="metric-label">Registrados en APP</div>
      <div class="metric-value">${totalMatched.toLocaleString('es')}</div>
      <div class="metric-sub">${coveragePct}% justificados</div>
    </div>
    <div class="metric m-danger">
      <div class="metric-label">No registrados (Gaps)</div>
      <div class="metric-value">${totalUnmatched.toLocaleString('es')}</div>
      <div class="metric-sub">viajes fantasma</div>
    </div>
    <div class="metric ${coverageClass}">
      <div class="metric-label">Cobertura de Flota</div>
      <div class="metric-value">${coveragePct}%</div>
      <div class="metric-sub">eficiencia de registros</div>
    </div>
  </div>
  <div class="coverage-bar-wrap">
    <div class="coverage-label">
      <span>Progreso General de Conciliación</span>
      <span>${coveragePct}%</span>
    </div>
    <div class="coverage-bar">
      <div class="coverage-fill" style="width:${coveragePct}%;background:${coverage >= 85 ? 'var(--ok)' : coverage >= 60 ? 'var(--warn)' : 'var(--danger)'};"></div>
    </div>
  </div>
  `);

  html.push(`
  <div class="table-card">
    <div class="table-toolbar">
      <span class="table-title">Desglose de Auditoría</span>
      <div class="table-controls">
        <input class="search" id="searchInput" placeholder="Filtrar por matrícula…" oninput="filterTable()"/>
      </div>
    </div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="resortBy('plate')" class="${sortCol==='plate'?'sorted':''}">Matrícula</th>
        <th onclick="resortBy('deviceName')" class="${sortCol==='deviceName'?'sorted':''}">Nombre Geotab</th>
        <th onclick="resortBy('total')" class="${sortCol==='total'?'sorted':''}">Trips Geotab</th>
        <th onclick="resortBy('matched')" class="${sortCol==='matched'?'sorted':''}">En APP</th>
        <th onclick="resortBy('unmatched')" class="${sortCol==='unmatched'?'sorted':''}">No en APP ↓</th>
        <th onclick="resortBy('_cov')" class="${sortCol==='_cov'?'sorted':''}">Cobertura</th>
        <th>Estado</th>
        <th>Detalle</th>
      </tr></thead>
      <tbody id="vehicleTableBody">
  `);

  vehicles.forEach((v, vi) => {
    const cov = v._cov;
    const pillClass = cov >= 85 ? 'pill-ok' : cov >= 60 ? 'pill-warn' : 'pill-danger';
    const nivel = cov >= 85 ? 'Correcto' : cov >= 60 ? 'Revisar' : 'Crítico';
    const barColor = cov >= 85 ? 'var(--ok)' : cov >= 60 ? 'var(--warn)' : 'var(--danger)';

    const showAll = document.getElementById('filterShow').value === 'all';
    const detailTrips = showAll ? v.trips : v.trips.filter(t => !t.matched);
    detailTrips.sort((a,b) => a.gStart - b.gStart);

    html.push(`
    <tr class="vehicle-row" onclick="toggleExpand('exp-${vi}', this)">
      <td><strong>${v.plateOrig || v.plate}</strong></td>
      <td style="color:var(--ink-mid)">${v.deviceName}</td>
      <td>${v.total}</td>
      <td style="color:var(--ok);font-weight:600;">${v.matched}</td>
      <td style="color:var(--danger);font-weight:700;">${v.unmatched}</td>
      <td>
        <div class="mini-bar">
          <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${cov.toFixed(0)}%;background:${barColor};"></div></div>
          <span>${cov.toFixed(0)}%</span>
        </div>
      </td>
      <td><span class="pill ${pillClass}">${nivel}</span></td>
      <td style="color:var(--ink-light);font-size:12px;">${detailTrips.length > 0 ? '▼ Ver ' + detailTrips.length : '—'}</td>
    </tr>
    `);

    html.push(`<tr><td colspan="8" style="padding:0;">`);
    html.push(`<div class="expand-section" id="exp-${vi}">`);
    if (detailTrips.length === 0) {
      html.push(`<div class="trips-sub"><p style="font-size:12px;color:var(--ok);padding:12px;">✓ Cero descuadres detectados en este coche.</p></div>`);
    } else {
      html.push(`<div class="trips-sub">`);
      html.push(`<div class="trips-sub-title">${showAll ? 'Historial de movimientos' : 'Viajes detectados en Geotab sin registro equivalente en la APP'}</div>`);
      html.push(`<div class="trip-list">`);
      detailTrips.forEach(t => {
        const mapUrl = buildMapUrl(t);
        const matchBadge = t.matched
          ? `<span class="pill pill-ok" style="font-size:10px;">En APP</span>`
          : `<span class="pill pill-danger" style="font-size:10px;">No registrado</span>`;
        html.push(`
        <div class="trip-item">
          <span class="trip-date">${fmtDate(t.gStart)}</span>
          <span class="trip-time">${fmtTime(t.gStart)} – ${fmtTime(t.gStop)}</span>
          <span class="trip-dist">${t.gDist} km</span>
          <span class="trip-dur">${t.gDur} min</span>
          <span class="trip-route">
            🧑‍✈️ ${t.geotabDriverName}
          </span>
          <div class="trip-actions">
            ${matchBadge}
            <a class="trip-link" href="${mapUrl}" target="_blank">
              Ir a MyGeotab ↗
            </a>
          </div>
        </div>`);
      });
      html.push(`</div></div>`);
    }
    html.push(`</div></td></tr>`);
  });

  html.push(`</tbody></table></div>`);
  html.push(`<div class="table-footer">
    <span>${vehicles.length} vehículos auditados · Clic en cualquier fila para desplegar mapa e historial</span>
  </div>`);
  html.push(`</div>`);

  document.getElementById('resultsArea').innerHTML = html.join('');
  document.getElementById('btnExport').style.display = 'inline-flex';
}

function toggleExpand(id, row) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.expand-section.open').forEach(e => e.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

function filterTable() {
  const q = document.getElementById('searchInput')?.value.toLowerCase() || '';
  document.querySelectorAll('.vehicle-row').forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? '' : 'none';
    const next = row.nextElementSibling;
    if (next) next.style.display = text.includes(q) ? '' : 'none';
  });
}

function resortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  
  const allDates = csvTrips.map(t=>t.reqTime).filter(Boolean);
  const minDate = allDates.length ? new Date(Math.min(...allDates)) : new Date();
  const maxDate = allDates.length ? new Date(Math.max(...allDates)) : new Date();
  
  renderResults(
    parseInt(document.getElementById('tolerance').value)||5,
    parseFloat(document.getElementById('minDist').value)||0.5,
    minDate.toISOString(),
    maxDate.toISOString()
  );
}

function buildMapUrl(t) {
  const from = encodeURIComponent(t.gStart.toISOString());
  const to   = encodeURIComponent(t.gStop.toISOString());
  return `https://my.geotab.com/blun/#tripsHistory,id:${t.deviceId},fromDate:${from},toDate:${to}`;
}

function exportExcel() {
  const unmatched = results.filter(r => !r.matched);
  const rows = [
    ['Matrícula','Nombre Dispositivo','Conductor Telemetría','Fecha','Inicio','Fin','Duración (min)','Distancia (km)','Enlace Verificación'],
    ...unmatched.map(r => [
      r.plateOrig, r.deviceName, r.geotabDriverName,
      fmtDate(r.gStart), fmtTime(r.gStart), fmtTime(r.gStop),
      r.gDur, r.gDist, buildMapUrl(r)
    ])
  ];

  const byPlate = {};
  results.forEach(r => {
    if (!byPlate[r.plate]) byPlate[r.plate] = { plateOrig:r.plateOrig, deviceName:r.deviceName, total:0, matched:0, unmatched:0 };
    byPlate[r.plate].total++;
    if (r.matched) byPlate[r.plate].matched++;
    else byPlate[r.plate].unmatched++;
  });
  
  const summaryRows = [
    ['Matrícula','Nombre Geotab','Total Desplazamientos','Viajes en APP','Gaps detectados','Eficiencia %'],
    ...Object.values(byPlate).map(v => [
      v.plateOrig, v.deviceName, v.total, v.matched, v.unmatched,
      +(v.total>0?(v.matched/v.total*100):0).toFixed(1)
    ])
  ];

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws1, 'Gaps de Viajes');

  const ws2 = XLSX.utils.aoa_to_sheet(summaryRows);
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen de Flota');

  XLSX.writeFile(wb, `auditoria_vtc_gaps.xlsx`);
}

function fmtDate(d) {
  if (!d) return '';
  return d.toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtTime(d) {
  if (!d) return '';
  return d.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'});
}
function fmtDateShort(d) {
  if (!d) return '';
  return d.toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit'});
}

function showLoading(msg) {
  document.getElementById('resultsArea').innerHTML =
    `<div class="state"><div class="spinner"></div><p class="progress-msg">${msg}</p></div>`;
  document.getElementById('btnExport').style.display = 'none';
}
function updateLoading(msg) {
  const p = document.querySelector('.progress-msg');
  if (p) p.textContent = msg;
}
function showError(msg) {
  document.getElementById('resultsArea').innerHTML =
    `<div class="state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${msg}</p></div>`;
}
</script>
